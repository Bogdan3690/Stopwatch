<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="timer">
      <p class="clockface js-clockface">00:00:00</p>

      <div class="actions">
        <button style="color: rgb(0, 255, 0);" class="timer-btn" data-action="start">Запустити</button>
        <button style="color: rgb(255, 0, 0);" class="timer-btn" data-action="stop">Зупинити</button>
        <button style="color: black;" class="timer-btn" data-action="reset">Reset</button>
      </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
